name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'next.config.ts', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build standalone bundle
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/self_study?schema=public' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'build-time-placeholder-secret' }}
          AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:3000' }}
          AUTH_TRUST_HOST: "true"
          MAX_FILE_SIZE_MB: ${{ secrets.MAX_FILE_SIZE_MB || '200' }}
          NEXT_PUBLIC_MAX_FILE_SIZE_MB: ${{ secrets.NEXT_PUBLIC_MAX_FILE_SIZE_MB || '200' }}
        run: |
          npm ci
          npm run build
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          test -f .next/standalone/server.js
          test -n "$(find .next/standalone/.next/static/chunks -maxdepth 1 -name '*.css' -print -quit)"
          grep -r "2026027939" .next/standalone/.next/ && echo "ICP: OK" || { echo "ICP: MISSING"; exit 1; }

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload bundle to server
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "rm -rf '$SERVER_PATH/.upload' && mkdir -p '$SERVER_PATH/.upload'"
          rsync -az --delete \
            --exclude ".env" --exclude "storage" \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            .next/standalone/ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/.upload/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            .next/static/ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/.upload/.next/static/"

      - name: Activate and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          echo "=== Keep swap available for runtime spikes ==="
          if ! swapon --show 2>/dev/null | grep -q /swapfile; then
            sudo fallocate -l 1G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024 2>/dev/null || true
            sudo chmod 600 /swapfile 2>/dev/null || true
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap done (errors above may be harmless)"
          fi
          free -h

          echo "=== Activate uploaded bundle ==="
          test -f .upload/server.js
          css_file=\$(find .upload/.next/static/chunks -maxdepth 1 -name '*.css' -print -quit)
          test -n "\$css_file"
          echo "CSS bundle: \$css_file"
          grep -r "2026027939" .upload/.next/ >/dev/null && echo "ICP: OK" || { echo "ICP: MISSING"; exit 1; }
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".upload" \
            ! -name ".env" \
            ! -name ".pgdata" \
            ! -name "storage" \
            ! -name "tmp" \
            -exec rm -rf {} +
          cp -a .upload/. .
          rm -rf .upload

          echo "=== Restart pm2 ==="
          pm2 delete "$PM2_APP_NAME" || true
          PORT="\${PORT:-3000}" HOSTNAME="\${HOSTNAME:-0.0.0.0}" pm2 start server.js --name "$PM2_APP_NAME"
          sleep 3
          css_name=\$(basename "\$css_file")
          curl -fsI "http://127.0.0.1:\${PORT:-3000}/_next/static/chunks/\$css_name"
          pm2 save || true
          EOF
