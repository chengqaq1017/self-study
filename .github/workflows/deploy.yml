name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate deploy secrets
        run: |
          test -n "$SERVER_HOST" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "$SERVER_PORT" || (echo "Missing secret: SERVER_PORT" && exit 1)
          test -n "$SERVER_USER" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "$SERVER_PATH" || (echo "Missing secret: SERVER_PATH" && exit 1)
          test -n "$PM2_APP_NAME" || (echo "Missing secret: PM2_APP_NAME" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync source files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude ".git" \
            --exclude ".env" \
            --exclude ".next" \
            --exclude ".pgdata" \
            --exclude "node_modules" \
            --exclude "storage" \
            ./ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - name: Install dependencies on server
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o ServerAliveInterval=30 \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          NODE_OPTIONS="--max-old-space-size=384" npm ci
          EOF

      - name: Build app (on GitHub Actions)
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          AUTH_SECRET: dummy-build-secret

      - name: Verify build
        run: grep -r "2026027939" .next/server/app/ && echo "ICP备案号: OK"

      - name: Deploy .next to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            .next/ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/.next/"

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o ServerAliveInterval=30 \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          pm2 restart "$PM2_APP_NAME"
          echo "Deploy done"
          EOF
