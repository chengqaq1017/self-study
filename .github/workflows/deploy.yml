name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude ".git" --exclude ".env" --exclude ".next" \
            --exclude ".pgdata" --exclude "node_modules" --exclude "storage" \
            ./ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          free -h
          echo "Stop pm2"
          pm2 stop "$PM2_APP_NAME" || true
          echo "Clean & install"
          rm -rf .next node_modules
          NODE_OPTIONS="--max-old-space-size=256" npm ci
          echo "Build"
          NODE_OPTIONS="--max-old-space-size=256" npm run build
          echo "Start pm2"
          pm2 start "$PM2_APP_NAME"
          grep -r "2026027939" .next/server/app/ && echo "ICP: OK" || echo "ICP: MISSING"
          EOF
