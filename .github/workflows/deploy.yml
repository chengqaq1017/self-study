name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude ".git" --exclude ".env" --exclude ".next" \
            --exclude ".pgdata" --exclude "node_modules" --exclude "storage" \
            ./ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - name: Build and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=10 \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          free -h

          echo "=== Stop pm2 ==="
          pm2 stop "$PM2_APP_NAME" || true

          echo "=== Force-delete old .next ==="
          sudo rm -rf .next 2>/dev/null || true
          st=\$(stat -c '%a' .next 2>/dev/null || echo 'gone')
          echo ".next status: \$st"

          echo "=== Create swap (1GB) ==="
          if ! swapon --show 2>/dev/null | grep -q /swapfile; then
            sudo fallocate -l 1G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024 2>/dev/null || true
            sudo chmod 600 /swapfile 2>/dev/null || true
            sudo mkswap /swapfile 2>/dev/null || true
            sudo swapon /swapfile 2>/dev/null || true
            echo "Swap done (errors above may be harmless)"
          fi
          free -h

          echo "=== Verify Footer source ==="
          grep "2026027939" src/components/layout/Footer.tsx && echo "OK" || { echo "MISSING - abort"; exit 1; }

          echo "=== Install deps ==="
          rm -rf node_modules
          npm ci
          echo "=== Build ==="
          npm run build
          echo "=== Verify ICP in build ==="
          grep -r "2026027939" .next/ 2>/dev/null && echo "ICP: OK" || echo "ICP: MISSING"
          echo "=== Start pm2 ==="
          pm2 start "$PM2_APP_NAME"
          EOF
