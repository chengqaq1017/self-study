name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Package build
        id: package
        run: |
          tar czf build.tar.gz .next node_modules package.json package-lock.json
          echo "name=build" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v6
        with:
          name: build
          path: build.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PATH: ${{ secrets.SERVER_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 15 -p "$SERVER_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync source files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            --exclude ".git" --exclude ".env" --exclude ".next" \
            --exclude ".pgdata" --exclude "node_modules" --exclude "storage" \
            ./ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - uses: actions/download-artifact@v6
        with:
          name: build

      - name: Deploy build to server
        run: |
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" \
            build.tar.gz "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" << EOF
          set -e
          cd "$SERVER_PATH"
          pm2 stop "$PM2_APP_NAME" || true
          tar xzf build.tar.gz
          rm build.tar.gz
          pm2 start "$PM2_APP_NAME"
          echo "Deploy done"
          EOF
